name: Release Bundle

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Metadata
        id: release_meta
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            $tagName = $env:GITHUB_REF_NAME
            $versionLabel = $tagName
            if ($versionLabel.StartsWith("v") -or $versionLabel.StartsWith("V")) {
              $versionLabel = $versionLabel.Substring(1)
            }
            if (-not $versionLabel) {
              throw "Could not resolve version label from tag '$tagName'."
            }
            if ($versionLabel -notmatch '^(?<core>\d+\.\d+\.\d+)(?<suffix>-[0-9A-Za-z.-]+)?$') {
              throw "Tag '$tagName' is not supported. Expected vX.Y.Z or vX.Y.Z-<suffix>."
            }
            $appVersion = $Matches["core"]
            $changelogVersion = $Matches["core"]
            $isPrerelease = [string]::IsNullOrEmpty($Matches["suffix"]) -eq $false
          } else {
            $pomVersion = (Select-String -Path "pom.xml" -Pattern '<version>([^<]+)</version>' | Select-Object -First 1).Matches[0].Groups[1].Value.Trim()
            if (-not $pomVersion) {
              throw "Could not resolve project version from pom.xml for PR build metadata."
            }
            $versionLabel = $pomVersion
            $appVersion = $pomVersion
            $changelogVersion = $pomVersion
            $isPrerelease = $false
          }
          "version_label=$versionLabel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "app_version=$appVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "changelog_version=$changelogVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build JAR
        run: mvn -B -Dmaven.test.skip=true clean package

      - name: Download Temurin 17 JRE
        shell: pwsh
        run: |
          $runtimeZip = Join-Path $env:GITHUB_WORKSPACE "dist\temurin17-jre.zip"
          New-Item -ItemType Directory -Path (Split-Path $runtimeZip) -Force | Out-Null
          if (-not (Test-Path -LiteralPath $runtimeZip)) {
            $url = "https://api.adoptium.net/v3/binary/latest/17/ga/windows/x64/jre/hotspot/normal/eclipse"
            Invoke-WebRequest -Uri $url -OutFile $runtimeZip
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          if (-not (Test-Path -LiteralPath $wixPath)) {
            throw "Expected WiX path not found: $wixPath"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $wixPath

      - name: Build Portable Bundle
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version_label }}"
          if (-not $version -or $version -match 'merge') {
            $version = (Get-Content -LiteralPath "cli/target/maven-archiver/pom.properties" | Where-Object { $_ -like "version=*" }) -replace "version=", ""
          }
          $appVersion = "${{ steps.release_meta.outputs.app_version }}"
          if (-not $appVersion) {
            $appVersion = $version
          }
          $jarPath = Join-Path $env:GITHUB_WORKSPACE "cli\target\cli-$appVersion.jar"
          if (-not (Test-Path -LiteralPath $jarPath)) {
            $fallback = Get-ChildItem -Path "cli/target" -Filter "cli-$appVersion.jar" -File |
              Where-Object { $_.Name -notlike "*original*" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if (-not $fallback) {
              $fallback = Get-ChildItem -Path "cli/target" -Filter "cli-*.jar" -File |
              Where-Object { $_.Name -notlike "*original*" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            }
            if ($fallback) {
              $jarPath = $fallback.FullName
            } else {
              throw "CLI jar not found at $jarPath"
            }
          }

          $runtimeZip = Join-Path $env:GITHUB_WORKSPACE "dist\temurin17-jre.zip"
          if (-not (Test-Path -LiteralPath $runtimeZip)) {
            throw "Runtime zip not found at $runtimeZip"
          }

          $runtimeDir = Join-Path $env:RUNNER_TEMP "temurin17-jre"
          if (Test-Path -LiteralPath $runtimeDir) {
            Remove-Item -LiteralPath $runtimeDir -Recurse -Force
          }
          Expand-Archive -LiteralPath $runtimeZip -DestinationPath $runtimeDir

          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "dist\wms-pallet-tag-system-$version-portable"
          .\scripts\build-portable-bundle.ps1 -JarPath $jarPath -BundleDir $bundleDir -SourceRoot $env:GITHUB_WORKSPACE -RuntimeSource $runtimeDir

          $bundleZip = Join-Path $env:GITHUB_WORKSPACE "dist\wms-pallet-tag-system-$version-portable.zip"
          if (Test-Path -LiteralPath $bundleZip) {
            Remove-Item -LiteralPath $bundleZip -Force
          }
          Compress-Archive -Path $bundleDir -DestinationPath $bundleZip

      - name: Build Installer Bundle
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version_label }}"
          $appVersion = "${{ steps.release_meta.outputs.app_version }}"
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "dist\wms-pallet-tag-system-$version-app"
          .\scripts\build-jpackage-bundle.ps1 -InstallerType exe -SourceRoot $env:GITHUB_WORKSPACE -BundleDir $bundleDir -BundleVersionLabel $version -AppVersion $appVersion

      - name: Build Release Notes
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.changelog_version }}"
          $lines = Get-Content -LiteralPath "CHANGELOG.md"
          $startMatch = $lines | Select-String -Pattern "^## \[$([regex]::Escape($version))\]" | Select-Object -First 1
          if (-not $startMatch) {
            throw "CHANGELOG entry not found for version $version"
          }
          $startIndex = $startMatch.LineNumber - 1
          $nextMatch = $lines | Select-String -Pattern "^## \[" | Where-Object { $_.LineNumber -gt $startMatch.LineNumber } | Select-Object -First 1
          if ($nextMatch) {
            $endIndex = $nextMatch.LineNumber - 2
          } else {
            $endIndex = $lines.Length - 1
          }
          $body = $lines[$startIndex..$endIndex] -join "`n"
          Set-Content -LiteralPath "release-notes.txt" -Value $body

      - name: Upload Bundle Artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: wms-pallet-tag-system-${{ github.sha }}-portable
          path: |
            dist/wms-pallet-tag-system-*-portable.zip
            dist/WMS Pallet Tag System-*.exe
            dist/WMS Pallet Tag System-*.exe.sha256

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
          files: |
            dist/wms-pallet-tag-system-*-portable.zip
            dist/WMS Pallet Tag System-*.exe
            dist/WMS Pallet Tag System-*.exe.sha256
